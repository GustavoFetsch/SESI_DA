<!DOCTYPE html>
<html lang="PT-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PetShop</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header class="menu">
        <img src="./barbie.jpg" alt="Não foi possivel carregar a imagem">
        <h1>Encontre tudo para o seu pet</h1>
        <p>PetShop</p>
    </header>

    <div class="campo-pesquisa">
        <input type="text" placeholder="Pesquisar">
    </div>

    <div class="group-card">
        <div class="card" style="background-image: url(./gato.jpg);">
            <p>gatos</p>
        </div>
        <div class="card" style="background-image: url(./cachorro.jpg);">
            <p>cachorros</p>
        </div>
        <div class="card" style="background-image: url(./aves.jpg);">
            <p>aves</p>
        </div>
        <div class="card" style="background-image: url(./peixe.webp);">
            <p>peixes</p>
        </div>
    </div>


   <div class="banner">
    <div class="card-banner">

        <div class="card-esquerdo">
            <p>Torne-se um membro <br>e ganhe um desconto</p>
            <button class="meu-botao">Clique aqui</button>
        </div>

        <div class="card-direito"></div>

    </div>
</div>

</body>

</html>
